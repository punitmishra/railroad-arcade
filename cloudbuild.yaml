# Cloud Build configuration for Railroad Arcade
# Builds Docker image and deploys to GKE

substitutions:
  _GKE_CLUSTER: railroad-arcade-cluster
  _GKE_ZONE: us-central1-a
  _IMAGE_NAME: railroad-arcade

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - '.'
    id: 'build-image'

  # Step 2: Push the Docker image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA'
    id: 'push-image-sha'
    waitFor:
      - 'build-image'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
    id: 'push-image-latest'
    waitFor:
      - 'build-image'

  # Step 3: Configure kubectl to connect to GKE cluster
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=k8s/deployment.yaml'
      - '--image=gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--location=${_GKE_ZONE}'
      - '--cluster=${_GKE_CLUSTER}'
    id: 'deploy-to-gke'
    waitFor:
      - 'push-image-sha'

# Store images in Google Container Registry
images:
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'

# Build timeout
timeout: '1200s'

# Build options
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
